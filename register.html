<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // Firestore ऐवजी Realtime Database Import केला आहे
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Configuration (तुमचे ओरिजिनल डिटेल्स)
    const firebaseConfig = {
        apiKey: "AIzaSyBesNn3cSSFCVnZVqeenWdX1SR0MOBji9M",
        authDomain: "codewave-fc5b5.firebaseapp.com",
        databaseURL: "https://codewave-fc5b5-default-rtdb.firebaseio.com", // Realtime DB साठी हे महत्त्वाचे आहे
        projectId: "codewave-fc5b5",
        storageBucket: "codewave-fc5b5.firebasestorage.app",
        messagingSenderId: "136875582316",
        appId: "1:136875582316:web:b9ed0b06589364ca690949",
        measurementId: "G-69GP009NJ0"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app); // Realtime Database Initialize

    let currentRole = "Student";

    // Role Selection
    window.selectRole = (role) => {
        currentRole = role;
        document.getElementById('roleStudent').classList.remove('active');
        document.getElementById('roleCompany').classList.remove('active');
        if(role === 'Student') document.getElementById('roleStudent').classList.add('active');
        else document.getElementById('roleCompany').classList.add('active');
    };

    // Registration Logic
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('regBtn');
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;

        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            // १. Create User in Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // २. Save Data in Realtime Database
            // 'users/UID' या ठिकाणी डेटा सेव्ह होईल
            await set(ref(database, 'users/' + user.uid), {
                fullName: name,
                email: email,
                phone: phone,
                role: currentRole,
                uid: user.uid,
                registeredAt: new Date().toISOString()
            });

            alert("Account Created Successfully in Realtime Database!");
            window.location.href = "login.html";

        } catch (error) {
            console.error("Error: ", error);
            alert("Error: " + error.message);
            btn.innerText = "Create Account";
            btn.disabled = false;
        }
    });
</script>
